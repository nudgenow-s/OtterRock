<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>库存录入 · 獭掌柜</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
font-family: ‘PingFang SC’,‘Helvetica Neue’,sans-serif;
background: #F7F7F7;
min-height: 100vh;
max-width: 480px;
margin: 0 auto;
display: flex;
flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
background: #fff;
border-bottom: 2px solid #EBEBEB;
padding: 14px 20px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky; top: 0; z-index: 100;
}
.topbar-back  { font-size:15px; font-weight:800; color:#FF6B35; cursor:pointer; }
.topbar-title { font-size:17px; font-weight:900; color:#222; }
.topbar-done  {
font-size:15px; font-weight:800; color:#FF6B35;
cursor:pointer; opacity:.35; transition:opacity .15s;
pointer-events: none;
}
.topbar-done.ready { opacity:1; pointer-events:auto; }

/* ── 说明卡 ── */
.info-card {
margin: 14px 16px 0;
background: #FFF8F0;
border: 2px solid #FFE0C8;
border-radius: 16px;
padding: 12px 16px;
display: flex; gap: 10px; align-items: flex-start;
}
.info-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
.info-text { font-size:13px; font-weight:700; color:#AA6020; line-height:1.6; }

/* ── SCROLL ── */
.scroll-area {
flex: 1;
overflow-y: auto;
padding: 14px 16px 130px;
-webkit-overflow-scrolling: touch;
}

/* ── 录入卡片 ── */
.entry-card {
background: #fff;
border-radius: 20px;
margin-bottom: 12px;
box-shadow: 0 3px 0 #E8E8E8;
overflow: hidden;
animation: slideIn .25s ease;
}
@keyframes slideIn {
from { opacity:0; transform:translateY(10px); }
to   { opacity:1; transform:translateY(0); }
}

.entry-header {
display: flex; align-items: center;
justify-content: space-between;
padding: 14px 16px 12px;
border-bottom: 1px solid #F5F5F5;
}
.entry-prod-info {
display: flex; align-items: center; gap: 10px;
flex: 1; min-width: 0;
}
.entry-emoji {
width: 44px; height: 44px;
background: #FFF0EB; border-radius: 12px;
display: flex; align-items: center; justify-content: center;
font-size: 23px; flex-shrink: 0;
}
.entry-prod-name {
font-size: 15px; font-weight: 900; color: #222;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.entry-prod-sub {
font-size: 11px; font-weight: 700; color: #AAAAAA; margin-top: 2px;
}
.entry-del {
width: 32px; height: 32px;
background: #FFF0F0; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 17px; cursor: pointer; color: #F44336; flex-shrink: 0;
transition: background .12s;
}
.entry-del:active { background: #FFD6D6; }

.entry-body { padding: 14px 16px; }

.field-row { display:flex; gap:10px; margin-bottom:10px; }
.field-row:last-child { margin-bottom:0; }
.field-item { flex:1; min-width:0; }

.field-label {
font-size:11px; font-weight:800; color:#AAAAAA;
display:block; margin-bottom:5px;
}
.field-input {
width:100%; height:46px;
background:#F5F5F5;
border:2px solid transparent;
border-radius:12px;
padding:0 12px;
font-size:15px; font-family:inherit; color:#222;
outline:none; transition:border-color .15s;
-webkit-appearance: none;
}
.field-input:focus { border-color:#FF6B35; background:#fff; }
.field-input.date-input { font-size:13px; padding:0 10px; }

/* 到期日预览 */
.expiry-preview {
margin-top: 8px;
padding: 8px 12px;
border-radius: 10px;
font-size: 12px; font-weight: 800;
display: none;
}
.expiry-preview.safe    { background:#F0FFF4; color:#4CAF50; }
.expiry-preview.warning { background:#FFF8E1; color:#FF9800; }
.expiry-preview.danger  { background:#FFF0F0; color:#F44336; }

/* ── 添加商品按钮 ── */
.add-item-btn {
width: 100%;
height: 56px;
background: #fff;
border: 2px dashed #DDDDDD;
border-radius: 18px;
display: flex; align-items: center; justify-content: center;
gap: 8px;
font-size: 15px; font-weight: 800; color: #AAAAAA;
cursor: pointer;
transition: all .15s;
margin-bottom: 12px;
}
.add-item-btn:active { background:#F9F9F9; border-color:#BBBBBB; color:#888; }

/* ── 底부 提交栏 ── */
.submit-bar {
position: fixed;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 100%; max-width: 480px;
background: #fff;
border-top: 2px solid #EBEBEB;
padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
}
.submit-summary {
display: flex; justify-content: space-between;
align-items: center; margin-bottom: 12px;
}
.ss-label { font-size:13px; font-weight:700; color:#AAAAAA; }
.ss-count { font-size:18px; font-weight:900; color:#222; }
.ss-count span { color:#FF6B35; }

.btn-submit {
width: 100%; height: 54px;
background: #FF6B35; color: #fff;
border: none; border-radius: 18px;
font-size: 17px; font-weight: 900; font-family: inherit;
cursor: pointer;
box-shadow: 0 5px 0 #C44D1A;
transition: all .1s;
display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-submit:active { transform:translateY(4px); box-shadow:0 1px 0 #C44D1A; }
.btn-submit:disabled {
background: #E0E0E0; box-shadow:0 5px 0 #C8C8C8; cursor:not-allowed;
}

/* ── 商品选择弹窗 ── */
.overlay {
display:none; position:fixed; inset:0;
background:rgba(0,0,0,.5); z-index:500;
align-items:flex-end;
}
.overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.sheet {
background:#fff; width:100%;
border-radius:28px 28px 0 0;
padding:0 0 34px;
animation:sheetUp .3s ease;
max-height:85vh; overflow:hidden;
display:flex; flex-direction:column;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.sh-handle {
width:44px; height:5px; background:#E0E0E0;
border-radius:3px; margin:14px auto 0;
flex-shrink: 0;
}
.sh-search-wrap {
padding: 14px 16px 10px; flex-shrink: 0;
}
.sh-search {
width:100%; height:44px;
background:#F5F5F5; border:2px solid transparent;
border-radius:14px; padding:0 16px 0 42px;
font-size:15px; font-family:inherit; color:#222;
outline:none;
}
.sh-search:focus { border-color:#FF6B35; }
.sh-search-icon {
position:absolute; left:30px;
font-size:16px; pointer-events:none;
}
.sh-search-container { position:relative; }

.sh-list { overflow-y:auto; flex:1; padding:0 16px; }

.prod-pick-item {
display:flex; align-items:center; gap:12px;
padding:12px 0;
border-bottom:1px solid #F5F5F5;
cursor:pointer;
transition:background .12s;
}
.prod-pick-item:active { background:#FFF8F5; border-radius:12px; margin:0 -8px; padding:12px 8px; }
.prod-pick-item:last-child { border-bottom:none; }

.pp-emoji {
width:42px; height:42px;
background:#FFF0EB; border-radius:12px;
display:flex; align-items:center; justify-content:center;
font-size:22px; flex-shrink:0;
}
.pp-info { flex:1; min-width:0; }
.pp-name { font-size:15px; font-weight:900; color:#222; }
.pp-sub  { font-size:11px; font-weight:700; color:#AAAAAA; margin-top:2px; }
.pp-price{ font-size:14px; font-weight:900; color:#FF6B35; }

.sh-empty {
text-align:center; padding:40px 20px;
font-size:14px; font-weight:700; color:#CCCCCC;
}

.sh-new-btn {
margin: 12px 16px 0;
height:48px; width:calc(100% - 32px);
background:#F5F5F5; color:#FF6B35;
border:2px dashed #FFCCB3;
border-radius:14px;
font-size:14px; font-weight:900; font-family:inherit;
cursor:pointer; flex-shrink:0;
transition:all .12s;
}
.sh-new-btn:active { background:#FFF0EB; }
</style>

</head>
<body>

<!-- TOPBAR -->

<div class="topbar">
  <div class="topbar-back" onclick="history.back()">← 返回</div>
  <div class="topbar-title">库存录入</div>
  <div class="topbar-done" id="done-btn" onclick="submitAll()">完成</div>
</div>

<!-- 说明卡 -->

<div class="info-card">
  <div class="info-icon">📋</div>
  <div class="info-text">
    录入货架上现有库存。<br>
    库存只在<strong>售出时</strong>计入当日变动成本。
  </div>
</div>

<!-- 录入列表 -->

<div class="scroll-area">
  <div id="entry-list"></div>
  <div class="add-item-btn" onclick="openProductPicker()">
    <span>＋</span> 添加商品
  </div>
</div>

<!-- 底部提交栏 -->

<div class="submit-bar">
  <div class="submit-summary">
    <span class="ss-label">已添加商品</span>
    <span class="ss-count"><span id="entry-count">0</span> 种</span>
  </div>
  <button class="btn-submit" id="submit-btn" onclick="submitAll()" disabled>
    <span>✅</span> 确认录入库存
  </button>
</div>

<!-- 商品选择弹窗 -->

<div class="overlay" id="picker-overlay" onclick="overlayTap(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-search-wrap">
      <div class="sh-search-container">
        <span class="sh-search-icon">🔍</span>
        <input class="sh-search" id="picker-search" type="text"
               placeholder="搜索商品…" oninput="renderPicker()">
      </div>
    </div>
    <button class="sh-new-btn" onclick="goCreateProduct()">＋ 新建商品</button>
    <div class="sh-list" id="picker-list"></div>
  </div>
</div>

<script>
// ── 工具 ─────────────────────────────────────────
var CAT_EMOJI = {'酒水':'🍺','食品':'🍔','烟草':'🚬','生活用品':'🧴','数码配件':'🔌'};
function catEmoji(cat){ return CAT_EMOJI[cat]||'📦'; }

function getProducts(){
  try{ return JSON.parse(localStorage.getItem('otter_products'))||[]; }
  catch(e){ return []; }
}
function saveProducts(arr){
  localStorage.setItem('otter_products', JSON.stringify(arr));
}
function getBatches(){
  try{ return JSON.parse(localStorage.getItem('otter_batches'))||[]; }
  catch(e){ return []; }
}
function saveBatches(arr){
  localStorage.setItem('otter_batches', JSON.stringify(arr));
}
function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,6);
}

// 计算到期日（生产日期 + 保质期天数）
function calcExpiry(mfgDate, shelfDays){
  if(!mfgDate || !shelfDays) return null;
  var d = new Date(mfgDate);
  d.setDate(d.getDate() + parseInt(shelfDays));
  return d;
}

// 计算距到期天数
function daysUntilExpiry(expiryDate){
  if(!expiryDate) return null;
  var now  = new Date(); now.setHours(0,0,0,0);
  var diff = Math.floor((expiryDate - now) / 86400000);
  return diff;
}

function toDateInputVal(d){
  if(!d) return '';
  var dd = new Date(d);
  return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
}

// ── 录入条目状态 ─────────────────────────────────
var entries = []; // [{ id, productId, qty, cost, price, mfgDate, shelfDays }]

// ── 渲染录入列表 ─────────────────────────────────
function renderEntryList(){
  var list = document.getElementById('entry-list');
  var products = getProducts();
  list.innerHTML = '';

  entries.forEach(function(entry, idx){
    var p = products.find(function(x){ return x.id===entry.productId; });
    if(!p) return;

    var card = document.createElement('div');
    card.className = 'entry-card';
    card.id = 'entry-card-'+idx;

    card.innerHTML =
      '<div class="entry-header">'+
        '<div class="entry-prod-info">'+
          '<div class="entry-emoji">'+catEmoji(p.category)+'</div>'+
          '<div>'+
            '<div class="entry-prod-name">'+p.name+'</div>'+
            '<div class="entry-prod-sub">'+(p.category||'未分类')+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="entry-del" onclick="removeEntry('+idx+')">✕</div>'+
      '</div>'+
      '<div class="entry-body">'+
        // 数量 + 进货价 + 售价
        '<div class="field-row">'+
          '<div class="field-item">'+
            '<label class="field-label">数量</label>'+
            '<input class="field-input" type="number" inputmode="numeric" placeholder="0"'+
                   ' value="'+(entry.qty||'')+'"'+
                   ' onchange="updateEntry('+idx+',\'qty\',this.value)">'+
          '</div>'+
          '<div class="field-item">'+
            '<label class="field-label">进货价 (¥)</label>'+
            '<input class="field-input" type="number" inputmode="decimal" placeholder="0.00"'+
                   ' value="'+(entry.cost||'')+'"'+
                   ' onchange="updateEntry('+idx+',\'cost\',this.value)">'+
          '</div>'+
          '<div class="field-item">'+
            '<label class="field-label">售价 (¥)</label>'+
            '<input class="field-input" type="number" inputmode="decimal" placeholder="0.00"'+
                   ' value="'+(entry.price||p.price||'')+'"'+
                   ' onchange="updateEntry('+idx+',\'price\',this.value)">'+
          '</div>'+
        '</div>'+
        // 生产日期 + 保质期
        '<div class="field-row">'+
          '<div class="field-item">'+
            '<label class="field-label">生产日期</label>'+
            '<input class="field-input date-input" type="date"'+
                   ' value="'+(entry.mfgDate||'')+'"'+
                   ' onchange="updateEntry('+idx+',\'mfgDate\',this.value)">'+
          '</div>'+
          '<div class="field-item">'+
            '<label class="field-label">保质期（天）</label>'+
            '<input class="field-input" type="number" inputmode="numeric" placeholder="例：180"'+
                   ' value="'+(entry.shelfDays||'')+'"'+
                   ' onchange="updateEntry('+idx+',\'shelfDays\',this.value)">'+
          '</div>'+
        '</div>'+
        // 到期日预览
        '<div class="expiry-preview" id="expiry-preview-'+idx+'"></div>'+
      '</div>';

    list.appendChild(card);

    // 渲染到期预览
    refreshExpiryPreview(idx, entry, p);
  });

  updateSummary();
}

// 刷新到期预览
function refreshExpiryPreview(idx, entry, p){
  var preview = document.getElementById('expiry-preview-'+idx);
  if(!preview) return;

  var expiryDate = calcExpiry(entry.mfgDate, entry.shelfDays);
  if(!expiryDate){ preview.style.display='none'; return; }

  var days = daysUntilExpiry(expiryDate);
  var warnDays = parseInt(p.expiryWarnDays)||7;
  var dateStr = expiryDate.getFullYear()+'年'+(expiryDate.getMonth()+1)+'月'+expiryDate.getDate()+'日';

  preview.style.display = 'block';

  if(days < 0){
    preview.className = 'expiry-preview danger';
    preview.textContent = '⚠️ 已过期 '+Math.abs(days)+' 天（到期日：'+dateStr+'）';
  } else if(days <= warnDays){
    preview.className = 'expiry-preview warning';
    preview.textContent = '⏰ 还有 '+days+' 天到期（到期日：'+dateStr+'）';
  } else {
    preview.className = 'expiry-preview safe';
    preview.textContent = '✓ 到期日：'+dateStr+'（还有 '+days+' 天）';
  }
}

// 更新某条录入字段
function updateEntry(idx, field, value){
  if(!entries[idx]) return;
  entries[idx][field] = value;

  var products = getProducts();
  var p = products.find(function(x){ return x.id===entries[idx].productId; });
  if(p) refreshExpiryPreview(idx, entries[idx], p);

  updateSummary();
}

// 删除条目
function removeEntry(idx){
  entries.splice(idx, 1);
  renderEntryList();
}

// 更新底部汇总
function updateSummary(){
  var count = entries.length;
  document.getElementById('entry-count').textContent = count;

  var btn  = document.getElementById('submit-btn');
  var done = document.getElementById('done-btn');

  var hasValid = entries.some(function(e){
    return e.qty && parseFloat(e.qty) > 0;
  });

  btn.disabled = !(count > 0 && hasValid);
  if(count > 0 && hasValid){
    done.classList.add('ready');
  } else {
    done.classList.remove('ready');
  }
}

// ── 商品选择弹窗 ─────────────────────────────────
function openProductPicker(){
  document.getElementById('picker-search').value = '';
  renderPicker();
  document.getElementById('picker-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('picker-search').focus(); }, 350);
}

function closePicker(){
  document.getElementById('picker-overlay').classList.remove('open');
}

function overlayTap(e){
  if(e.target===document.getElementById('picker-overlay')) closePicker();
}

function renderPicker(){
  var products = getProducts();
  var query    = (document.getElementById('picker-search').value||'').toLowerCase().trim();
  var list     = document.getElementById('picker-list');

  // 已选的商品ID
  var selectedIds = entries.map(function(e){ return e.productId; });

  var filtered = products.filter(function(p){
    var matchQ = !query ||
      p.name.toLowerCase().includes(query) ||
      (p.barcode||'').includes(query);
    return matchQ;
  });

  if(filtered.length === 0){
    list.innerHTML = '<div class="sh-empty">没有找到商品<br>点上方「新建商品」添加</div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(function(p){
    var already = selectedIds.includes(p.id);
    var item = document.createElement('div');
    item.className = 'prod-pick-item';
    item.style.opacity = already ? '.45' : '1';

    item.innerHTML =
      '<div class="pp-emoji">'+catEmoji(p.category)+'</div>'+
      '<div class="pp-info">'+
        '<div class="pp-name">'+p.name+(already?' <span style="color:#AAAAAA;font-size:11px">已添加</span>':'')+'</div>'+
        '<div class="pp-sub">'+(p.category||'未分类')+(p.barcode?' · '+p.barcode:'')+'</div>'+
      '</div>'+
      '<div class="pp-price">¥'+parseFloat(p.price||0).toFixed(2)+'</div>';

    if(!already){
      item.onclick = function(){
        addEntry(p.id, p.price, p.cost);
        closePicker();
      };
    }
    list.appendChild(item);
  });
}

function addEntry(productId, defaultPrice, defaultCost){
  // 同一商品不重复添加
  var exists = entries.some(function(e){ return e.productId===productId; });
  if(exists) return;

  entries.push({
    id:        uid(),
    productId: productId,
    qty:       '',
    cost:      defaultCost||'',
    price:     defaultPrice||'',
    mfgDate:   '',
    shelfDays: ''
  });
  renderEntryList();
}

function goCreateProduct(){
  closePicker();
  window.location.href = 'products.html';
}

// ── 提交 ─────────────────────────────────────────
function submitAll(){
  var products = getProducts();
  var batches  = getBatches();
  var now      = new Date();
  var saved    = 0;

  entries.forEach(function(entry){
    var qty = parseInt(entry.qty)||0;
    if(qty <= 0) return;

    var pIdx = products.findIndex(function(p){ return p.id===entry.productId; });
    if(pIdx < 0) return;

    // 更新商品库存（累加）
    products[pIdx].stock = (parseFloat(products[pIdx].stock)||0) + qty;

    // 更新商品进货价与售价（以本次录入为准）
    if(entry.cost)  products[pIdx].cost  = parseFloat(entry.cost);
    if(entry.price) products[pIdx].price = parseFloat(entry.price);

    // 计算到期日
    var expiryDate = calcExpiry(entry.mfgDate, entry.shelfDays);

    // 写入批次记录（供临期看板使用）
    batches.push({
      id:         uid(),
      productId:  entry.productId,
      qty:        qty,
      remaining:  qty,
      cost:       parseFloat(entry.cost)||0,
      price:      parseFloat(entry.price)||0,
      mfgDate:    entry.mfgDate||null,
      shelfDays:  parseInt(entry.shelfDays)||null,
      expiryDate: expiryDate ? toDateInputVal(expiryDate) : null,
      type:       'stock_entry',   // 区分于进货
      createdAt:  now.toISOString()
    });

    saved++;
  });

  saveProducts(products);
  saveBatches(batches);

  if(saved === 0){
    alert('请至少填写一个商品的数量');
    return;
  }

  // 成功提示
  showSuccess(saved);
}

function showSuccess(count){
  var overlay = document.createElement('div');
  overlay.style.cssText =
    'position:fixed;inset:0;background:rgba(255,255,255,.96);'+
    'display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;'+
    'animation:fadeIn .25s ease;';
  overlay.innerHTML =
    '<div style="font-size:72px;margin-bottom:20px">✅</div>'+
    '<div style="font-size:22px;font-weight:900;color:#222;margin-bottom:8px">录入成功</div>'+
    '<div style="font-size:15px;font-weight:700;color:#AAAAAA;margin-bottom:36px">已更新 '+count+' 种商品的库存</div>'+
    '<button onclick="history.back()" style="'+
      'height:54px;padding:0 40px;background:#FF6B35;color:#fff;'+
      'border:none;border-radius:18px;font-size:17px;font-weight:900;font-family:inherit;'+
      'cursor:pointer;box-shadow:0 5px 0 #C44D1A;">返回</button>';
  document.body.appendChild(overlay);
}

// ── 初始化 ───────────────────────────────────────
renderEntryList();
</script>

</body>
</html>
